name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Arrow.sln

      - name: Build
        run: dotnet build Arrow.sln -c Release --no-restore

      - name: Test
        run: dotnet test Arrow.sln -c Release --no-build --verbosity normal
